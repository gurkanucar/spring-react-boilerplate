# ==================== TEST CONFIGURATION ====================
# Auto-loaded for every test (src/test/resources is first on the test classpath).
# Keeps tests off the 'dev' profile and on a disposable in-memory H2 database, so no
# env vars or external services (DB/Redis) are required to run the suite.
spring.profiles.active=test

# Disposable H2 (PostgreSQL compatibility mode), recreated per run.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Each @SpringBootTest(RANDOM_PORT) context starts its own server; give the separate
# management server a random port too so multiple cached contexts don't collide on 8081.
management.server.port=0

