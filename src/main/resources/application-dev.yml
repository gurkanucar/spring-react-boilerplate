spring:
  # Local dev runs on PostgreSQL (start it with `docker compose up -d`). Override the connection
  # with DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD.
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/appdb}
    username: ${DATABASE_USERNAME:app}
    password: ${DATABASE_PASSWORD:app}
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates that the entities match it.
      ddl-auto: validate
    show-sql: false

logging:
  level:
    org.hibernate.tool.schema: INFO #DEBUG
