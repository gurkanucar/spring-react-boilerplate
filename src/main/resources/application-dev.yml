spring:
  # Boots out-of-the-box on in-memory H2 when no DB env vars are set; point at a real
  # database by exporting DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD.
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        hbm2ddl.halt_on_error: true
    show-sql: false

logging:
  level:
    org.hibernate.tool.schema: INFO #DEBUG
