<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verification code</title>
</head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif;color:#1f2933;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:32px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="480" cellpadding="0" cellspacing="0"
                   style="background:#ffffff;border-radius:12px;padding:40px;max-width:480px;">
                <tr>
                    <td>
                        <h1 style="margin:0 0 16px;font-size:20px;color:#111827;">Your verification code</h1>
                        <p style="margin:0 0 24px;font-size:14px;line-height:1.6;color:#4b5563;">
                            Use the code below to continue. Requested for:
                            <strong th:text="${type}">ACCOUNT_VERIFICATION</strong>.
                        </p>
                        <div style="text-align:center;margin:0 0 24px;">
                            <span th:text="${code}"
                                  style="display:inline-block;font-size:32px;letter-spacing:8px;font-weight:bold;
                                         color:#111827;background:#f3f4f6;border-radius:8px;padding:16px 24px;">123456</span>
                        </div>
                        <p style="margin:0;font-size:12px;line-height:1.6;color:#9ca3af;">
                            If you did not request this, you can safely ignore this email.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
