# Base message bundle (English). Serves as the fallback for every locale that lacks its
# own bundle. Keys are referenced from MessageUtil / GlobalExceptionHandler / ExceptionType.
# NOTE: messages used WITH arguments are formatted by java.text.MessageFormat, so literal
# single quotes must be doubled ('') in those entries.

