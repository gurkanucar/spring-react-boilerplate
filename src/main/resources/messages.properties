# Base message bundle (English). Serves as the fallback for every locale that lacks its
# own bundle. Keys are referenced from MessageUtil / GlobalExceptionHandler / ExceptionType.
# NOTE: messages used WITH arguments are formatted by java.text.MessageFormat, so literal
# single quotes must be doubled ('') in those entries.

messages.fallback=An error occurred.

# ---- Generic ----
error.default=Invalid request.
error.unexpected=An unexpected error occurred. Please try again later.
error.validation_failed=Validation failed.

# ---- Not found / conflicts ----
error.not_found={0} with id {1} was not found.
error.resource.not.found=The requested resource was not found.
error.already_exists={0} already exists.
error.already_exists.detail={0} with {1} ''{2}'' already exists.
error.duplicate_resource=A record with the same unique value already exists.
error.data_integrity=The request could not be completed due to a data integrity constraint.
error.concurrent_modification=The record was modified by another request. Please retry.

# ---- Web ----
error.endpoint_not_found=No endpoint found for {0} {1}.
error.method_not_allowed=HTTP method {0} is not supported for this endpoint.
error.missing_parameter=Required parameter ''{0}'' is missing.
error.type_mismatch=Parameter ''{0}'' must be of type {1}; received ''{2}''.

# ---- Auth ----
error.auth.unauthenticated=Authentication is required to access this resource.
error.auth.forbidden=You do not have permission to access this resource.
error.auth.invalid_credentials=Invalid username or password.
error.auth.account_locked=Your account is locked.
error.auth.account_disabled=Your account is disabled.

# ---- Tenant ----
error.tenant.no_workspace_context=No workspace context is available for this request.
error.tenant.cross_workspace=The requested resource was not found.
error.tenant.no_organization_context=No organization context is available for this request.
error.tenant.cross_organization=The requested resource was not found.
