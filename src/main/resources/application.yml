# ==================== APPLICATION CONFIGURATION ====================
server:
  shutdown: graceful

spring:
  application:
    name: spring-react-boilerplate
  profiles:
    active: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        # Batch-loads lazy collections/associations via IN (...) instead of one query per row,
        # which prevents N+1 when mapping a page of entities that touch lazy collections
        # (e.g. News.imageIds / News.tags element collections, User.roles).
        default_batch_fetch_size: 100
  #    show-sql: true
  #        format_sql: true

  # ==================== JSON (JACKSON 3) ====================
  jackson:
    default-property-inclusion: non_null
    serialization:
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    datatype:
      datetime:
        write-dates-as-timestamps: false

  # ==================== SERVLET & MULTIPART CONFIG ====================
  servlet:
    multipart:
      enabled: true
      # Container limit slightly above upload.max-bytes (50MB) so the upload validator returns the
      # nice FILE_TOO_LARGE error for files up to the cap, not a raw container error.
      max-file-size: 55MB
      max-request-size: 60MB
  datasource:
    hikari:
      maximum-pool-size: 10
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      # Fail fast on a dead/idle connection instead of hanging ~20s on the OS TCP timeout.
      timeout: 4s
      connect-timeout: 5s
      lettuce:
        shutdown-timeout: 200ms
  # SMTP. When host is blank no JavaMailSender is created and EmailService logs instead of sending,
  # so the app boots without mail configured. Set MAIL_HOST + app.mail.enabled=true to send for real.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ==================== APPLICATION CONFIG ====================
app:
  redis:
    key-prefix: ${REDIS_KEY_PREFIX:}
  cors:
    # Comma-separated origin patterns allowed by the SecurityConfig CORS policy. Treated as
    # patterns (setAllowedOriginPatterns), so "*" is allowed even with credentials. The dev
    # profile overrides this to "*" (allow all); prod should pin explicit origins via env.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  mail:
    # Master switch for outbound email. Off by default so non-prod envs never send real mail.
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:no-reply@example.com}
  rate-limit:
    # Per-IP token bucket on sensitive endpoints (login/register/otp). capacity tokens per window.
    # Kept generous because many users can share one public IP (NAT/corporate networks); method-level
    # limits are done separately with resilience4j @RateLimiter (see below).
    enabled: ${RATE_LIMIT_ENABLED:true}
    capacity: ${RATE_LIMIT_CAPACITY:100}
    refill-seconds: ${RATE_LIMIT_REFILL_SECONDS:60}
    paths:
      - /auth/login
      - /auth/register
      - /otp/send

# Method-level rate limits via resilience4j's built-in @RateLimiter (name-based, global per instance).
# Add an instance here and annotate the method with @RateLimiter(name = "<instance>").
resilience4j:
  ratelimiter:
    instances:
      markAllNotificationsRead:
        limit-for-period: 60          # permits per refresh window
        limit-refresh-period: 60s
        timeout-duration: 0s          # reject immediately (429) instead of blocking

# ==================== COMMON ACTUATOR CONFIG ====================
management:
  server:
    port: 8081
  health:
    redis:
      # Disabled so the app stays UP when Redis is down (caches connect lazily on first use).
      enabled: false
  endpoint:
    health:
      show-details: ALWAYS
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  tracing:
    sampling:
      probability: '1.0'

# ==================== STORAGE / FILE UPLOAD ====================
storage:
  # Backend NEW uploads go to: FILESYSTEM | S3 | R2. Existing files resolve to wherever stored.
  default-type: ${STORAGE_DEFAULT:FILESYSTEM}
  filesystem:
    enabled: ${STORAGE_FILESYSTEM_ENABLED:true}
    base-path: ${STORAGE_FS_BASE_PATH:./uploads}
    public-url: ${STORAGE_FS_PUBLIC_URL:}
  s3:
    enabled: ${STORAGE_S3_ENABLED:true}
    bucket: ${STORAGE_S3_BUCKET:}
    region: ${STORAGE_S3_REGION:us-east-1}
    endpoint: ${STORAGE_S3_ENDPOINT:}
    access-key: ${STORAGE_S3_ACCESS_KEY:}
    secret-key: ${STORAGE_S3_SECRET_KEY:}
    public-url: ${STORAGE_S3_PUBLIC_URL:}
  r2:
    enabled: ${STORAGE_R2_ENABLED:true}
    bucket: ${STORAGE_R2_BUCKET:}
    access-key: ${STORAGE_R2_ACCESS_KEY:}
    secret-key: ${STORAGE_R2_SECRET_KEY:}
    endpoint: ${STORAGE_R2_ENDPOINT:}
    public-url: ${STORAGE_R2_PUBLIC_URL:}

upload:
  max-bytes: ${UPLOAD_MAX_BYTES:52428800}
  deny-ext: ${UPLOAD_DENY_EXT:.exe,.dll,.so,.sh,.bat,.cmd,.com,.msi,.scr,.ps1}
  allow-ext: ${UPLOAD_ALLOW_EXT:}

# Image uploads (POST /files/images) are re-encoded to WebP + a thumbnail; normal uploads are stored as-is.
image:
  quality: ${IMAGE_QUALITY:80}
  max-dimension: ${IMAGE_MAX_DIMENSION:2000}
  thumbnail-size: ${IMAGE_THUMBNAIL_SIZE:256}

# ==================== OTP CONFIGURATION ====================
otp:
  length: 6
  expiry-minutes: 5
  max-attempts: 5
  # Min seconds between two sends to the same (destination, type) — throttles resend abuse. 0 disables.
  resend-cooldown-seconds: 60
  # Hourly purge of expired/used OTPs (guarded by ShedLock).
  cleanup-cron: "0 0 * * * *"

# ==================== SECURITY CONFIGURATION ====================
security:
  jwt:
    # 32+ byte HMAC secret. A dev/test default is provided so the app boots out of the box;
    # ALWAYS override with a strong JWT_SECRET_KEY env var in real environments.
    secret-key: ${JWT_SECRET_KEY:dev-only-change-me-please-0123456789-abcdefghijklmnopqrstuvwxyz}
    token-validity-in-minutes: 800
    refresh-token-validity-in-minutes: 2400
    refresh-token-cleanup-cron: "0 0 * * * *"
  ignored-paths: >
    /swagger-resources/**,
    /swagger-ui.html/**,
    /swagger-ui/**,
    /v3/api-docs/**,
    /auth/register,
    /auth/login,
    /auth/refresh,
    /auth/logout,
    /otp/send,
    /otp/verify,
    /files/*/download,
    /files/*/thumbnail/download,
    /public/**,
    /api/v1/public/**,
    /ws/**,
    /timezone,
    /time,
    /healthcheck,
    /log-level,
    /actuator/**,
    /sw.js,
    /hello,
    /whoami

# ==================== LOGBOOK CONFIGURATION ====================
logbook:
  filter:
    enabled: true
  secure-filter:
    enabled: false
  format:
    style: http
  strategy: body-only-if-status-at-least
  obfuscate:
    headers: Authorization,X-API-Key
    parameters: password,accessToken
    json-body-fields: password,secret,refreshToken,accessToken
    replacement: XXX
  predicate:
    exclude:
      - path: /swagger-ui/**
      - path: /swagger-resources/**
      - path: /v3/api-docs/**
      - path: /actuator/health
      - path: /actuator/info
      - path: /sw.js
  write:
    max-body-size: 10000
  minimum-status: 200

# ==================== LOGGING LEVELS ====================
logging:
  level:
    org.zalando.logbook: TRACE
    #    org.hibernate.orm.jdbc.bind: TRACE
