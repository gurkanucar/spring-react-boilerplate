spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    hibernate:
      # Flyway owns the schema; Hibernate only validates the entities match it (never mutates prod).
      ddl-auto: validate

logbook:
  strategy: status-at-least
  minimum-status: 400

# ==================== OPENAPI / SWAGGER ====================
# Override to false in application-prod.yml to disable docs in production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ==================== PROD ACTUATOR ====================
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"


# ==================== LOGGING LEVELS ====================
logging:
  level:
    org.hibernate.orm.jdbc.bind: INFO