services:
  postgres:
    image: postgres:17-alpine
    container_name: srb-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-appdb}
      POSTGRES_USER: ${DATABASE_USERNAME:-app}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-app} -d ${DATABASE_NAME:-appdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: srb-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
